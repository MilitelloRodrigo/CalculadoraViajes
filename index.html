<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Ratonear 🐀 - Calculadora de Viajes y Comidas</title>
  <meta name="description" content="Dividí los gastos de tus viajes (proporcional por tramos) y de tus comidas (en partes iguales) de la forma más rápida, responsiva y sin complicaciones con Sin Ratonear.">
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Local Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SVG Icons Definitions Sprite for optimized performance -->
  <svg style="display: none;">
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
    </symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
    </symbol>
    <symbol id="icon-reset" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
      <path d="M3 3v5h5"></path>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"></path>
    </symbol>
    <symbol id="icon-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
      <line x1="10" y1="11" x2="10" y2="17"></line>
      <line x1="14" y1="11" x2="14" y2="17"></line>
    </symbol>
    <symbol id="icon-whatsapp" viewBox="0 0 24 24" fill="currentColor">
      <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.262 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.625 1.451 5.437.002 9.861-4.417 9.864-9.864.003-2.637-1.019-5.117-2.88-6.981C16.38 1.897 13.9 1.86 11.968 1.86c-5.439 0-9.864 4.423-9.867 9.87-.001 1.761.469 3.477 1.364 5.022L2.4 21.054l4.247-1.9zm11.367-6.602c-.3-.15-1.772-.875-2.046-.975-.276-.1-.476-.15-.676.15-.2.3-.775.975-.95 1.174-.175.2-.35.226-.65.075-1.127-.565-1.92-1.009-2.673-2.299-.199-.34-.02-.524.15-.694.152-.153.3-.35.45-.525.15-.175.2-.3.3-.5.1-.2.05-.375-.025-.525-.075-.15-.676-1.628-.926-2.228-.244-.588-.491-.507-.676-.516-.174-.008-.374-.01-.574-.01-.2 0-.525.075-.8 1.075-.275 1-.95 2.1-.175 2.875 1.625 1.625 3.563 2.502 6.563 3.502.6.2.975.3 1.35.225.425-.062 1.3-.525 1.475-1.025.175-.5.175-.925.125-1.025-.05-.1-.2-.15-.5-.3z"/>
    </symbol>
    <symbol id="icon-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
    </symbol>
    <symbol id="icon-map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
      <line x1="9" y1="3" x2="9" y2="18"></line>
      <line x1="15" y1="6" x2="15" y2="21"></line>
    </symbol>
  </svg>

  <div class="app-container">
    
    <!-- HEADER COMPONENT -->
    <viaje-header></viaje-header>

    <!-- TAB NAVIGATION SELECTOR -->
    <nav class="tab-navigation">
      <button id="tab-btn-travel" class="tab-btn active" data-tab="travel">
        <span class="tab-icon">🚗</span>
        <span>Gastos de Viaje (Tramos)</span>
      </button>
      <button id="tab-btn-food" class="tab-btn" data-tab="food">
        <span class="tab-icon">🍔</span>
        <span>Gastos de Comida (Igualitario)</span>
      </button>
    </nav>

    <!-- METRICS COMPONENT -->
    <viaje-metrics></viaje-metrics>

    <!-- MAIN TWO COLUMN LAYOUT -->
    <main class="main-layout">

      <!-- LEFT COLUMN: INPUTS AND CONTROLS -->
      <div class="layout-column">
        
        <!-- PARTICIPANTS COMPONENT -->
        <viaje-participants></viaje-participants>

        <!-- ==================== TRAVEL TAB PANELS ==================== -->
        <div class="tab-content travel-content">
          <!-- TRIPS COMPONENT -->
          <viaje-trips></viaje-trips>
          <!-- ADD TRAVEL EXPENSE COMPONENT -->
          <viaje-add-expense></viaje-add-expense>
        </div>

        <!-- ==================== FOOD TAB PANELS ==================== -->
        <div class="tab-content food-content hidden-tab">
          <!-- ADD FOOD EXPENSE COMPONENT -->
          <viaje-add-food-expense></viaje-add-food-expense>
        </div>

      </div>

      <!-- RIGHT COLUMN: RESULTS AND BREAKDOWN -->
      <div class="layout-column">

        <!-- ==================== TRAVEL TAB PANELS ==================== -->
        <div class="tab-content travel-content">
          <!-- EXPENSES LIST COMPONENT -->
          <viaje-expenses-list></viaje-expenses-list>
          <!-- TRAVEL RESULTS COMPONENT -->
          <viaje-results></viaje-results>
        </div>

        <!-- ==================== FOOD TAB PANELS ==================== -->
        <div class="tab-content food-content hidden-tab">
          <!-- FOOD EXPENSES LIST COMPONENT -->
          <viaje-food-expenses-list></viaje-food-expenses-list>
          <!-- FOOD RESULTS COMPONENT -->
          <viaje-food-results></viaje-food-results>
        </div>

      </div>

    </main>

    <!-- FOOTER -->
    <footer class="app-footer">
      <p>Calculadora de Viajes <strong>Sin Ratonear</strong> — Creado con ❤️ para ruteros. Estático, privado y local.</p>
    </footer>

  </div>

  <!-- Reset Confirmation Modal -->
  <div class="modal-overlay" id="reset-modal">
    <div class="modal-content">
      <h3>⚠️ ¿Reiniciar Todo?</h3>
      <p>Se borrarán de forma permanente todos los participantes, viajes, comidas, gastos y configuraciones de este período. Esta acción no se puede deshacer.</p>
      <div class="modal-actions">
        <button id="cancel-reset-btn" class="btn btn-secondary">Cancelar</button>
        <button id="confirm-reset-btn" class="btn btn-danger">Sí, reiniciar todo</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Script (Native ES6 Module entry point) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
